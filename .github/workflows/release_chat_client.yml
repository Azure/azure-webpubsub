name: Release Azure Web PubSub chat client package
permissions:
  id-token: write # This is required for requesting the JWT
  contents: write
on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/release_chat_client.yml'
      - 'sdk/webpubsub-chat-client/package.json'
      - 'sdk/webpubsub-chat-client/CHANGELOG.md'
jobs:
  release:
    name: Release Azure Web PubSub chat client package
    uses: ./.github/workflows/workflow-call-release-package.yml
    secrets:
      AZURESDKPARTNERDROPS_URL: ${{ secrets.AZURESDKPARTNERDROPS_URL }}
      AZURESDKPARTNERDROPS_CLIENT_ID: ${{ secrets.AZURESDKPARTNERDROPS_CLIENT_ID }}
      AZURESDKPARTNERDROPS_SUBSCRIPTION_ID: ${{ secrets.AZURESDKPARTNERDROPS_SUBSCRIPTION_ID }}
      AZURESDKPARTNERDROPS_TENANT_ID: ${{ secrets.AZURESDKPARTNERDROPS_TENANT_ID }}
      GH_PAT: ${{ secrets.GH_PAT }}
    with:
      package_name: web-pubsub-chat-client
      package_folder: sdk/webpubsub-chat-client
      pack_command: |
        pushd sdk/webpubsub-chat-client
        yarn
        npm run pack:publish
        popd
